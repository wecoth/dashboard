<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Управление объектами</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Golos+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --bg2: #161b27;
    --bg3: #1e2535;
    --accent: #00d4aa;
    --red: #ff4757;
    --amber: #ffa502;
    --blue: #4f8ef7;
    --text: #e8eaf0;
    --muted: #6b7280;
    --border: rgba(255,255,255,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

  /* HEADER */
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; border-bottom: 1px solid var(--border); padding-bottom: 24px; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 2px; line-height: 1; }
  .header h1 span { color: var(--accent); }
  .header p { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .refresh-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--accent);
    padding: 10px 20px; border-radius: 8px; font-family: 'Golos Text', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;
  }
  .refresh-btn:hover { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .refresh-btn:disabled { opacity: 0.5; pointer-events: none; }

  /* KPI */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .kpi-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; position: relative; overflow: hidden; transition: transform 0.2s;
  }
  .kpi-card:hover { transform: translateY(-2px); }
  .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
  .kpi-card.green::before { background: var(--accent); }
  .kpi-card.blue::before { background: var(--blue); }
  .kpi-card.red::before { background: var(--red); }
  .kpi-card.amber::before { background: var(--amber); }
  .kpi-label { font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .kpi-value { font-family: 'Bebas Neue', sans-serif; font-size: 34px; letter-spacing: 1px; line-height: 1; margin-bottom: 4px; }
  .kpi-card.green .kpi-value { color: var(--accent); }
  .kpi-card.blue .kpi-value { color: var(--blue); }
  .kpi-card.red .kpi-value { color: var(--red); }
  .kpi-card.amber .kpi-value { color: var(--amber); }
  .kpi-sub { font-size: 11px; color: var(--muted); }

  /* СЕКЦИЯ */
  .section-title { font-size: 10px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }

  /* ТАБЛИЦА ОБЪЕКТОВ */
  .objects-table { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  .table-header {
    display: grid; grid-template-columns: 2.5fr 110px 130px 130px 130px 100px 80px;
    padding: 11px 20px; background: var(--bg3); border-bottom: 1px solid var(--border);
    font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted);
  }
  .table-row {
    display: grid; grid-template-columns: 2.5fr 110px 130px 130px 130px 100px 80px;
    padding: 13px 20px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: rgba(255,255,255,0.02); }
  .obj-name { font-weight: 600; font-size: 13px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .badge.work { background: rgba(255,165,2,0.15); color: var(--amber); }
  .badge.ok { background: rgba(0,212,170,0.15); color: var(--accent); }
  .badge.overdue { background: rgba(255,71,87,0.15); color: var(--red); }
  .amount { font-size: 13px; font-weight: 500; text-align: right; }
  .amount.pos { color: var(--accent); }
  .amount.neg { color: var(--red); }
  .amount.zero { color: var(--muted); }
  .days { font-size: 12px; text-align: center; }
  .days.warn { color: var(--amber); }
  .days.danger { color: var(--red); }
  .days.ok { color: var(--accent); }
  .tasks-count { text-align: center; font-size: 12px; }
  .tasks-count.has { background: rgba(255,71,87,0.15); color: var(--red); padding: 2px 8px; border-radius: 10px; font-weight: 600; display: inline-block; }

  /* НИЖНИЙ БЛОК */
  .bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .panel-header { padding: 13px 20px; background: var(--bg3); border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

  /* ЗАДАЧИ — карточки */
  .task-card { padding: 12px 20px; border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .task-card:last-child { border-bottom: none; }
  .task-card:hover { background: rgba(255,255,255,0.02); }
  .task-name { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
  .task-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .task-dot.overdue { background: var(--red); }
  .task-dot.pending { background: var(--amber); }
  .task-dot.none { background: var(--muted); }
  .task-obj { font-size: 11px; color: var(--muted); padding-left: 14px; }
  .task-date { font-size: 11px; color: var(--muted); padding-left: 14px; margin-top: 1px; }
  .task-date.overdue { color: var(--red); }

  /* ОПЕРАЦИИ */
  .op-row { padding: 11px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; transition: background 0.15s; }
  .op-row:last-child { border-bottom: none; }
  .op-row:hover { background: rgba(255,255,255,0.02); }
  .op-icon { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .op-icon.income { background: rgba(0,212,170,0.15); color: var(--accent); }
  .op-icon.expense { background: rgba(255,71,87,0.15); color: var(--red); }
  .op-body { flex: 1; min-width: 0; }
  .op-obj { font-size: 12px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .op-cat { font-size: 11px; color: var(--muted); }
  .op-amount { font-size: 13px; font-weight: 700; white-space: nowrap; }
  .op-amount.income { color: var(--accent); }
  .op-amount.expense { color: var(--red); }

  /* СЛУЖЕБНЫЕ */
  .loading-state { display: flex; align-items: center; justify-content: center; padding: 32px; color: var(--muted); font-size: 13px; gap: 10px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { padding: 20px; color: var(--red); font-size: 13px; text-align: center; line-height: 1.6; }

  @media (max-width: 900px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .bottom-grid { grid-template-columns: 1fr; }
    .table-header, .table-row { grid-template-columns: 2fr 100px 110px 110px; }
    .col-days, .col-tasks { display: none; }
    .header h1 { font-size: 32px; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>ОБЪЕКТЫ <span>// ДАШБОРД</span></h1>
      <p id="updated-at">Загрузка...</p>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="loadData()">↻ Обновить</button>
  </div>

  <div class="section-title">Сводка</div>
  <div class="kpi-grid">
    <div class="kpi-card green"><div class="kpi-label">Общий баланс</div><div class="kpi-value" id="k-balance">—</div><div class="kpi-sub">по всем объектам</div></div>
    <div class="kpi-card blue"><div class="kpi-label">Активных объектов</div><div class="kpi-value" id="k-objects">—</div><div class="kpi-sub">всего в работе</div></div>
    <div class="kpi-card red"><div class="kpi-label">Просроч. задач</div><div class="kpi-value" id="k-overdue">—</div><div class="kpi-sub">требуют внимания</div></div>
    <div class="kpi-card amber"><div class="kpi-label">Расходы за месяц</div><div class="kpi-value" id="k-expenses">—</div><div class="kpi-sub">текущий месяц</div></div>
  </div>

  <div class="section-title">Объекты</div>
  <div class="objects-table">
    <div class="table-header">
      <div>Наименование</div><div>Статус</div>
      <div style="text-align:right">Приход</div><div style="text-align:right">Расход</div><div style="text-align:right">Баланс</div>
      <div class="col-days" style="text-align:center">Дней</div>
      <div class="col-tasks" style="text-align:center">Задачи</div>
    </div>
    <div id="objects-list"><div class="loading-state"><div class="spinner"></div> Загрузка...</div></div>
  </div>

  <div class="bottom-grid">
    <div class="panel">
      <div class="panel-header">Задачи — просроченные и ближайшие</div>
      <div id="tasks-list"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>
    <div class="panel">
      <div class="panel-header">Последние операции</div>
      <div id="ops-list"><div class="loading-state"><div class="spinner"></div></div></div>
    </div>
  </div>

</div>
<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxPd2UwQme4SEs6u60jeAmPDpI5JYg2zJzS2kNP8A7okJ_zHmKZOM5IDzsvjzUFJj3d/exec';

const fmt = n => {
  if (n === null || n === undefined || n === '') return '—';
  return new Intl.NumberFormat('ru-RU', {style:'currency', currency:'RUB', maximumFractionDigits:0}).format(n);
};

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.textContent = '↻ Обновление...';

  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    renderKPI(data.objects, data.txs, data.tasks);
    renderObjects(data.objects, data.tasks);
    renderTasks(data.tasks);
    renderOps(data.txs);

    const now = new Date();
    document.getElementById('updated-at').textContent =
      'Обновлено: ' + now.toLocaleString('ru-RU', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('objects-list').innerHTML =
      `<div class="error-msg">Ошибка загрузки данных.<br>Проверь что Apps Script развёрнут с доступом "Все".<br><small>${e.message}</small></div>`;
  }

  btn.disabled = false;
  btn.textContent = '↻ Обновить';
}

function renderKPI(objects, txs, tasks) {
  const balance = objects.reduce((s,o) => s + (parseFloat(o['Текущий остаток (Баланс):']) || 0), 0);
  document.getElementById('k-balance').textContent = fmt(balance);
  document.getElementById('k-objects').textContent = objects.length;

  const now = new Date();
  const overdue = tasks.filter(t => {
    if (t['Статус'] === 'Выполнена') return false;
    if (!t['Срок']) return false;
    return new Date(t['Срок']) < now;
  }).length;
  document.getElementById('k-overdue').textContent = overdue;

  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
  const expenses = txs
    .filter(t => t['Тип (Расход/Приход)'] === 'Расход' && t['Дата'] && new Date(t['Дата']) >= monthStart)
    .reduce((s,t) => s + Math.abs(parseFloat(t['Сумма']) || 0), 0);
  document.getElementById('k-expenses').textContent = fmt(expenses);
}

function renderObjects(objects, tasks) {
  const now = new Date();
  if (!objects.length) {
    document.getElementById('objects-list').innerHTML = '<div class="loading-state">Нет данных</div>';
    return;
  }
  let html = '';
  objects.forEach(obj => {
    const name = obj['Наименование объекта'] || '—';
    const income = parseFloat(obj['Всего получено (Авансы):']) || 0;
    const expense = Math.abs(parseFloat(obj['Всего потрачено (Расходы):']) || 0);
    const balance = parseFloat(obj['Текущий остаток (Баланс):']) || 0;
    const daysLeft = parseFloat(obj['Рабочих дней осталось:']);

    let badge = '';
    if (isNaN(daysLeft)) badge = `<span class="badge work">🟡 В работе</span>`;
    else if (daysLeft < 0) badge = `<span class="badge overdue">🔴 Просрочен</span>`;
    else if (daysLeft < 7) badge = `<span class="badge work">🟡 Финал</span>`;
    else badge = `<span class="badge ok">🟢 В работе</span>`;

    const balClass = balance > 0 ? 'pos' : balance < 0 ? 'neg' : 'zero';
    const balSign = balance > 0 ? '+' : '';

    const daysClass = isNaN(daysLeft) ? '' : daysLeft < 0 ? 'danger' : daysLeft < 7 ? 'warn' : 'ok';
    const daysHtml = isNaN(daysLeft) ? '—' : `<span class="days ${daysClass}">${Math.round(daysLeft)}</span>`;

    const objOverdue = tasks.filter(t =>
      t['Объект'] === name && t['Статус'] !== 'Выполнена' && t['Срок'] && new Date(t['Срок']) < now
    ).length;
    const tasksHtml = objOverdue > 0
      ? `<span class="tasks-count has">${objOverdue}</span>`
      : `<span class="tasks-count" style="color:var(--muted)">✓</span>`;

    html += `<div class="table-row">
      <div class="obj-name">${name}</div>
      <div>${badge}</div>
      <div class="amount pos">${fmt(income)}</div>
      <div class="amount neg">${fmt(expense)}</div>
      <div class="amount ${balClass}">${balSign}${fmt(balance)}</div>
      <div class="col-days">${daysHtml}</div>
      <div class="col-tasks">${tasksHtml}</div>
    </div>`;
  });
  document.getElementById('objects-list').innerHTML = html;
}

function renderTasks(tasks) {
  const now = new Date();
  const active = tasks
    .filter(t => t['Статус'] !== 'Выполнена')
    .sort((a,b) => {
      if (!a['Срок'] && !b['Срок']) return 0;
      if (!a['Срок']) return 1;
      if (!b['Срок']) return -1;
      return new Date(a['Срок']) - new Date(b['Срок']);
    })
    .slice(0, 8);

  if (!active.length) {
    document.getElementById('tasks-list').innerHTML = '<div class="loading-state">Нет активных задач ✓</div>';
    return;
  }

  let html = '';
  active.forEach(t => {
    const name = t['Задача'] || '—';
    const obj = t['Объект'] || '—';
    const deadline = t['Срок'] ? new Date(t['Срок']) : null;
    const isOverdue = deadline && deadline < now;
    const dotClass = isOverdue ? 'overdue' : deadline ? 'pending' : 'none';
    let dateText = 'Без срока';
    let dateClass = '';
    if (deadline) {
      dateText = isOverdue
        ? '⚠ Просрочена · ' + deadline.toLocaleDateString('ru-RU')
        : deadline.toLocaleDateString('ru-RU');
      dateClass = isOverdue ? 'overdue' : '';
    }
    html += `<div class="task-card">
      <div class="task-name"><span class="task-dot ${dotClass}"></span>${name}</div>
      <div class="task-obj">${obj}</div>
      <div class="task-date ${dateClass}">${dateText}</div>
    </div>`;
  });
  document.getElementById('tasks-list').innerHTML = html;
}

function renderOps(txs) {
  const sorted = [...txs]
    .sort((a,b) => new Date(b['Дата']||0) - new Date(a['Дата']||0))
    .slice(0, 8);

  if (!sorted.length) {
    document.getElementById('ops-list').innerHTML = '<div class="loading-state">Нет операций</div>';
    return;
  }

  let html = '';
  sorted.forEach(tx => {
    const obj = tx['Объект'] || '—';
    const cat = tx['Категория'] || '—';
    const sum = Math.abs(parseFloat(tx['Сумма']) || 0);
    const type = tx['Тип (Расход/Приход)'] === 'Расход' ? 'expense' : 'income';
    const icon = type === 'income' ? '↑' : '↓';
    const amountText = (type === 'income' ? '+' : '-') + fmt(sum);
    html += `<div class="op-row">
      <div class="op-icon ${type}">${icon}</div>
      <div class="op-body">
        <div class="op-obj">${obj}</div>
        <div class="op-cat">${cat}</div>
      </div>
      <div class="op-amount ${type}">${amountText}</div>
    </div>`;
  });
  document.getElementById('ops-list').innerHTML = html;
}

// Старт + автообновление каждые 3 минуты
loadData();
setInterval(loadData, 3 * 60 * 1000);
</script>
</body>
</html>
